<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>당직 리워드 관리</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --key:#0C447C;--key-mid:#185FA5;--key-light:#E6F1FB;--key-border:#B5D4F4;
  --bg:#fff;--surface:#F5F5F3;--surface2:#ECEAE6;
  --border:rgba(0,0,0,0.10);--border-mid:rgba(0,0,0,0.18);
  --text:#1A1A18;--muted:#6B6B68;
  --success-bg:#EAF3DE;--success:#27500A;
  --warn-bg:#FAEEDA;--warn:#633806;
  --danger-bg:#FCEBEB;--danger:#791F1F;
  --r-sm:6px;--r-md:9px;--r-lg:12px;--r-xl:16px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI','Malgun Gothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif;
}
body{font-family:var(--font);background:#E8E8E6;min-height:100vh;padding:1.5rem 1rem}
.app{max-width:900px;margin:0 auto}
.header{background:var(--key);border-radius:var(--r-xl) var(--r-xl) 0 0;padding:1.5rem 1.75rem 0;border-bottom:3px solid rgba(255,255,255,0.15)}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
.logo{display:flex;align-items:center;gap:12px}
.logo-mark{width:40px;height:40px;border-radius:10px;background:rgba(255,255,255,0.18);display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid rgba(255,255,255,0.25)}
.logo-mark svg{width:18px;height:18px}
.logo-title{font-size:18px;font-weight:600;color:#fff;letter-spacing:-.02em}
.logo-sub{font-size:11.5px;color:rgba(255,255,255,0.6);margin-top:2px}
.team-pill{background:rgba(255,255,255,0.14);border:1px solid rgba(255,255,255,0.28);border-radius:20px;padding:5px 14px;font-size:12px;font-weight:600;color:rgba(255,255,255,0.9)}
.nav{display:flex}
.nav-btn{flex:1;padding:11px 6px;font-size:13px;font-weight:600;border:none;background:transparent;cursor:pointer;color:rgba(255,255,255,0.45);font-family:var(--font);border-bottom:3px solid transparent;transition:color .15s,border-color .15s;white-space:nowrap}
.nav-btn:hover{color:rgba(255,255,255,0.8)}
.nav-btn.active{color:#fff;border-bottom:3px solid #fff}
.body{background:var(--surface);border:1.5px solid rgba(12,68,124,0.18);border-top:none;border-radius:0 0 var(--r-xl) var(--r-xl);padding:1.5rem 1.75rem 2rem}
.page{display:none}.page.active{display:block}
.section-wrap{background:var(--bg);border:1.5px solid rgba(12,68,124,0.14);border-radius:var(--r-lg);overflow:hidden;margin-bottom:1.25rem}
.section-head{background:var(--key-light);border-bottom:1.5px solid var(--key-border);padding:10px 16px;display:flex;align-items:center;gap:8px}
.section-head-dot{width:8px;height:8px;border-radius:50%;background:var(--key-mid);flex-shrink:0}
.section-head-title{font-size:11px;font-weight:700;color:var(--key);letter-spacing:.07em;text-transform:uppercase}
.section-body{padding:1.25rem 1.5rem}
label{font-size:12px;font-weight:700;color:var(--muted);display:block;margin-bottom:5px;letter-spacing:.03em;text-transform:uppercase}
input[type=date],input[type=text],select,textarea{width:100%;padding:9px 12px;font-size:14px;font-weight:500;border:1.5px solid var(--border-mid);border-radius:var(--r-md);background:var(--bg);color:var(--text);font-family:var(--font);transition:border-color .15s}
textarea{resize:vertical;min-height:60px;line-height:1.5}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--key-mid);box-shadow:0 0 0 3px rgba(24,95,165,0.12)}
input.err,select.err{border-color:var(--danger);box-shadow:0 0 0 3px rgba(226,75,74,0.12)}
.fgrid{display:grid;gap:14px;margin-bottom:14px}
.c2{grid-template-columns:1fr 1fr}.c3{grid-template-columns:1fr 1fr 1fr}
.btn{padding:9px 20px;font-size:13px;font-weight:600;border:1.5px solid var(--border-mid);border-radius:var(--r-md);cursor:pointer;background:transparent;color:var(--text);font-family:var(--font)}
.btn-primary{background:var(--key-mid);color:#fff;border-color:var(--key-mid)}
.btn-sm{padding:4px 10px;font-size:11px;font-weight:600;border-radius:var(--r-sm)}
.btn-del{color:var(--danger);border-color:#F7C1C1;background:transparent}
.btn-ghost{color:var(--key);border-color:var(--key-border);background:var(--key-light)}
.preview-box{background:var(--key-light);border:1.5px solid var(--key-border);border-radius:var(--r-md);padding:10px 14px;font-size:13px;font-weight:500;color:var(--key);margin-bottom:14px;line-height:1.6;display:none}
.dup-warn{background:var(--danger-bg);border:1.5px solid #F7C1C1;border-radius:var(--r-md);padding:10px 14px;font-size:13px;font-weight:600;color:var(--danger);margin-bottom:14px;display:none;line-height:1.6}
.meal-check-wrap{display:flex;align-items:center;gap:10px;background:var(--success-bg);border:1.5px solid #C0DD97;border-radius:var(--r-md);padding:11px 14px;margin-bottom:14px;cursor:pointer;user-select:none}
.meal-check-wrap:hover{background:#dff0c8}
.meal-checkbox{width:20px;height:20px;border-radius:5px;border:2px solid #639922;background:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s,border-color .15s}
.meal-checkbox.checked{background:#639922;border-color:#639922}
.meal-checkbox.checked::after{content:'';display:block;width:5px;height:9px;border:2px solid #fff;border-top:none;border-left:none;transform:rotate(45deg) translate(-1px,-1px)}
.meal-check-label{font-size:13px;font-weight:600;color:var(--success)}
.meal-check-sub{font-size:11px;color:#3B6D11;margin-left:auto}
.badge-meal{background:var(--success-bg);color:var(--success);border:1px solid #C0DD97;display:inline-flex;align-items:center;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:700;white-space:nowrap;margin-left:4px}
.badge-meal-no{background:#FCEBEB;color:#A32D2D;border:1px solid #F09595;display:inline-flex;align-items:center;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:700;white-space:nowrap;margin-left:4px}
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.25rem}
.stat{background:var(--surface2);border:1.5px solid rgba(12,68,124,0.10);border-radius:10px;padding:14px}
.stat-lbl{font-size:10px;font-weight:700;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em}
.stat-val{font-size:26px;font-weight:600;color:var(--text);line-height:1}
.stat-unit{font-size:13px;font-weight:400;color:var(--muted)}
.stat-sub{font-size:11px;color:var(--muted);margin-top:4px}
.bar-track{height:6px;background:var(--surface2);border-radius:3px;margin:4px 0 1.25rem;border:1px solid var(--border)}
.bar-fill{height:100%;border-radius:3px;background:var(--key-mid);transition:width .3s}
.table-wrap{border:1.5px solid rgba(12,68,124,0.12);border-radius:var(--r-md);overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:9px 12px;font-size:10px;font-weight:700;color:var(--key);background:var(--key-light);border-bottom:1.5px solid var(--key-border);text-transform:uppercase;letter-spacing:.06em}
td{padding:9px 12px;border-bottom:1px solid var(--border);color:var(--text);font-weight:500;vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr:hover{background:var(--surface)}
.badge{display:inline-flex;align-items:center;font-size:11px;padding:3px 9px;border-radius:20px;font-weight:700;white-space:nowrap}
.b-duty{background:var(--key-light);color:var(--key);border:1px solid var(--key-border)}
.b-out{background:var(--warn-bg);color:var(--warn);border:1px solid #FAC775}
.b-in{background:var(--success-bg);color:var(--success);border:1px solid #C0DD97}
.b-use{background:var(--danger-bg);color:var(--danger);border:1px solid #F7C1C1}
.b-sp-night{background:#F0EAFE;color:#3C3489;border:1px solid #AFA9EC}
.dept-btn{padding:5px 14px;font-size:12px;font-weight:600;border-radius:20px;cursor:pointer;border:1.5px solid var(--border-mid);background:var(--bg);color:var(--muted);font-family:var(--font);transition:all .15s}
.dept-btn.active{color:#fff;border-color:transparent}
.dept-check-item{display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;border:1.5px solid var(--border-mid);cursor:pointer;font-size:12px;font-weight:600;color:var(--muted);user-select:none;transition:all .15s}
.dept-check-item.sel{color:#fff;border-color:transparent}
.b-sp-weekend{background:#FAEEDA;color:#633806;border:1px solid #FAC775}
.b-sp-other{background:#F1EFE8;color:#444441;border:1px solid #B4B2A9}
.member-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:1.25rem}
.mcard{background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r-lg);padding:13px 14px;cursor:pointer;transition:border-color .15s}
.mcard:hover{border-color:var(--key-mid);background:var(--key-light)}
.mcard.sel{border:2px solid var(--key-mid);background:var(--key-light)}
.mcard.sel .mcard-name{color:var(--key)}
.mcard-name{font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px}
.mcard-sub{font-size:11px;font-weight:500;color:var(--muted)}
.mcard-bar{height:4px;background:var(--surface2);border-radius:2px;margin-top:9px;border:1px solid var(--border)}
.mcard-bar-fill{height:100%;border-radius:2px;background:var(--key-mid)}
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;overflow:hidden}
.avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.member-row-item{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid var(--border)}
.member-row-item:last-child{border-bottom:none}
.empty{text-align:center;color:var(--muted);font-size:13px;padding:32px 0;font-weight:500}
.toast-wrap{display:flex;justify-content:center;margin-top:1.25rem;pointer-events:none}
.toast{background:var(--key);color:#fff;padding:9px 22px;border-radius:20px;font-size:13px;font-weight:600;opacity:0;transition:opacity .25s;pointer-events:none}
.sub-divider{font-size:10px;font-weight:700;color:var(--key);letter-spacing:.07em;text-transform:uppercase;padding:8px 0 6px;margin-bottom:8px;border-bottom:1.5px solid var(--key-border)}
.color-swatches{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.swatch{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .1s,border-color .1s;flex-shrink:0}
.swatch:hover{transform:scale(1.15)}
.swatch.sel{border-color:var(--text)}
.upload-area{display:flex;align-items:center;gap:14px}
.upload-preview{width:56px;height:56px;border-radius:50%;background:var(--key-light);border:1.5px solid var(--key-border);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:var(--key);overflow:hidden;flex-shrink:0}
.upload-preview img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.upload-btns{display:flex;flex-direction:column;gap:6px}
input[type=file]{display:none}
.note-text{font-size:12px;color:var(--muted);font-style:italic;margin-top:2px}
.cal-special{font-size:9px;font-weight:700;border-radius:3px;padding:1px 4px;display:inline-block;margin-top:1px;white-space:nowrap}
.cal-sp-night{background:#F0EAFE;color:#3C3489;border:1px solid #AFA9EC}
.cal-sp-weekend{background:#E6F1FB;color:#185FA5;border:1px solid #B5D4F4}
.cal-sp-other{background:#F1EFE8;color:#444441;border:1px solid #B4B2A9}

/* ── 당직 캘린더 ─────────────────────────────────────────── */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-title{font-size:15px;font-weight:700;color:var(--key)}
.cal-nav{background:transparent;border:1.5px solid var(--key-border);border-radius:var(--r-md);padding:5px 12px;cursor:pointer;font-size:13px;font-weight:600;color:var(--key);font-family:var(--font)}
.cal-nav:hover{background:var(--key-light)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-dow{text-align:center;font-size:10px;font-weight:700;color:var(--muted);padding:4px 0;letter-spacing:.04em;text-transform:uppercase}
.cal-dow.sun{color:#A32D2D}.cal-dow.sat{color:#185FA5}
.cal-cell{min-height:52px;border-radius:var(--r-sm);border:1.5px solid var(--border);background:var(--bg);padding:4px 5px;cursor:pointer;transition:border-color .12s,background .12s;position:relative}
.cal-cell:hover:not(.cal-empty):not(.cal-weekend):not(.cal-holiday){border-color:var(--key-mid);background:var(--key-light)}
.cal-cell.cal-empty{background:transparent;border-color:transparent;cursor:default}
.cal-cell.cal-weekend{background:var(--surface);border-color:transparent;cursor:default}
.cal-cell.cal-holiday{background:#FEF2F2;border-color:#FECACA;cursor:default}
.cal-cell.cal-today{border-color:var(--key-mid);border-width:2px}
.cal-cell.cal-has-duty{border-color:var(--key-border);background:var(--key-light)}
.cal-cell.cal-selected{border-color:var(--key-mid)!important;background:var(--key-light)!important;border-width:2px!important}
.cal-cell.cal-my-duty{border-color:#1D9E75;background:#EAF3DE}
.cal-date{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:2px}
.cal-cell.cal-weekend .cal-date{color:#B4B2A9}
.cal-cell.cal-holiday .cal-date{color:#A32D2D}
.cal-cell.cal-today .cal-date{color:var(--key);font-weight:700}
.cal-assignee{font-size:10px;font-weight:600;color:var(--key);background:var(--key-light);border:1px solid var(--key-border);border-radius:4px;padding:1px 4px;display:inline-block;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px}
.cal-cell.cal-my-duty .cal-assignee{color:#27500A;background:#EAF3DE;border-color:#C0DD97}
.cal-holiday-label{font-size:9px;color:#A32D2D;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cal-legend{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px;font-size:11px;color:var(--muted)}
.cal-legend-item{display:flex;align-items:center;gap:4px}
.cal-legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}

@media(max-width:640px){
  body{padding:.5rem}
  .header{border-radius:var(--r-lg) var(--r-lg) 0 0;padding:1.25rem 1rem 0}
  .body{padding:1rem;border-radius:0 0 var(--r-lg) var(--r-lg)}
  .c2,.c3{grid-template-columns:1fr}
  .stat-row{grid-template-columns:repeat(2,1fr)}
  .member-grid{grid-template-columns:repeat(2,1fr)}
  .nav-btn{font-size:11px;padding:9px 3px}
  .topbar{flex-direction:column;align-items:flex-start;gap:8px}
  .section-body{padding:1rem}
}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

<div class="app">
<div class="header">
  <div class="topbar">
    <div class="logo">
      <div class="logo-mark">
        <svg viewBox="0 0 18 18" fill="none"><rect x="2" y="2" width="6" height="6" rx="1.5" fill="white" opacity=".95"/><rect x="10" y="2" width="6" height="6" rx="1.5" fill="white" opacity=".6"/><rect x="2" y="10" width="6" height="6" rx="1.5" fill="white" opacity=".6"/><rect x="10" y="10" width="6" height="6" rx="1.5" fill="white" opacity=".25"/></svg>
      </div>
      <div>
        <div class="logo-title" id="logo-title"></div>
        <div class="logo-sub" id="logo-sub"></div>
      </div>
    </div>
    <div class="team-pill" id="team-pill"></div>
  </div>
  <nav class="nav" id="nav-bar"></nav>
</div>
<div class="body">
  <section id="page-input" class="page active">
    <!-- 근무표 캘린더 -->
    <div class="section-wrap" style="margin-bottom:1rem">
      <div class="section-head">
        <div class="section-head-dot"></div>
        <div class="section-head-title" id="sh-calendar"></div>
        <div style="margin-left:auto;display:flex;gap:6px;align-items:center">
          <button class="cal-nav" onclick="moveCalMonth(-1)">&#8249;</button>
          <span class="cal-title" id="cal-month-label"></span>
          <button class="cal-nav" onclick="moveCalMonth(1)">&#8250;</button>
        </div>
      </div>
      <div class="section-body" style="padding-bottom:.75rem">
        <div class="cal-grid" id="cal-dow-row"></div>
        <div class="cal-grid" id="cal-body" style="margin-top:3px"></div>
        <div class="cal-legend">
          <div class="cal-legend-item"><div class="cal-legend-dot" style="background:var(--key-light);border:1px solid var(--key-border)"></div>당직 지정</div>
          <div class="cal-legend-item"><div class="cal-legend-dot" style="background:#EAF3DE;border:1px solid #C0DD97"></div>선택된 팀원</div>
          <div class="cal-legend-item"><div class="cal-legend-dot" style="background:var(--surface);border:1px solid var(--border)"></div>주말</div>
          <div class="cal-legend-item"><div class="cal-legend-dot" style="background:#FEF2F2;border:1px solid #FECACA"></div>공휴일 (럭키)</div>
        </div>
      </div>
    </div>
    <div class="section-wrap">
      <div class="section-head"><div class="section-head-dot"></div><div class="section-head-title" id="sh-input"></div></div>
      <div class="section-body">
        <div class="fgrid c2">
          <div><label id="lbl-orig"></label><select id="inp-member" onchange="checkDuplicate()"></select></div>
          <div><label id="lbl-date"></label><input type="date" id="inp-date" onchange="checkDuplicate()"></div>
        </div>
        <div class="dup-warn" id="dup-warn"></div>
        <div class="fgrid c2">
          <div><label id="lbl-type"></label>
            <select id="inp-type" onchange="toggleSwap()">
              <option value="duty" id="opt-duty"></option>
              <option value="swap" id="opt-swap"></option>
              <option value="lucky" id="opt-lucky"></option>
            </select>
          </div>
          <div id="swap-wrap" style="display:none">
            <label id="lbl-sub"></label>
            <select id="inp-swap-target" onchange="updatePreview()"></select>
          </div>
          <div id="lucky-wrap" style="display:none">
            <label id="lbl-lucky-name"></label>
            <input type="text" id="inp-lucky-name" maxlength="20">
          </div>
        </div>
        <div class="preview-box" id="swap-preview"></div>
        <div class="meal-check-wrap" id="meal-check-wrap" onclick="toggleMeal()">
          <div class="meal-checkbox" id="meal-checkbox"></div>
          <span class="meal-check-label" id="meal-check-label"></span>
          <span class="meal-check-sub" id="meal-check-sub"></span>
        </div>
        <div class="fgrid" style="margin-bottom:14px">
          <div><label id="lbl-note"></label><input type="text" id="inp-note" maxlength="100"></div>
        </div>
        <div style="display:flex;justify-content:flex-end"><button class="btn btn-primary" id="btn-add-duty" onclick="addDuty()"></button></div>
      </div>
    </div>
  </section>
  <section id="page-special" class="page">
    <div class="section-wrap">
      <div class="section-head"><div class="section-head-dot"></div><div class="section-head-title" id="sh-special"></div></div>
      <div class="section-body">
        <div class="fgrid c2">
          <div><label id="lbl-sp-member"></label><select id="sp-member"></select></div>
          <div><label id="lbl-sp-date"></label><input type="date" id="sp-date"></div>
        </div>
        <div class="fgrid c2">
          <div>
            <label id="lbl-sp-type"></label>
            <select id="sp-type" onchange="onSpTypeChange()">
              <option value="night" id="opt-sp-night"></option>
              <option value="weekend" id="opt-sp-weekend"></option>
              <option value="other" id="opt-sp-other"></option>
            </select>
          </div>
          <div>
            <label id="lbl-sp-hours"></label>
            <input type="number" id="sp-hours" min="0.5" max="24" step="0.5" style="width:100%;padding:9px 12px;font-size:14px;font-weight:500;border:1.5px solid var(--border-mid);border-radius:var(--r-md);background:var(--bg);color:var(--text);font-family:var(--font)">
          </div>
        </div>
        <div class="fgrid" style="margin-bottom:14px">
          <div><label id="lbl-sp-note"></label><input type="text" id="sp-note" maxlength="100"></div>
        </div>
        <div style="display:flex;justify-content:flex-end"><button class="btn btn-primary" id="btn-add-special" onclick="addSpecial()"></button></div>
      </div>
    </div>
  </section>
  <section id="page-use" class="page">
    <div class="section-wrap">
      <div class="section-head"><div class="section-head-dot"></div><div class="section-head-title" id="sh-use"></div></div>
      <div class="section-body">
        <div class="fgrid c3">
          <div><label id="lbl-use-member"></label><select id="use-member"></select></div>
          <div><label id="lbl-use-date"></label><input type="date" id="use-date"></div>
          <div><label id="lbl-use-type"></label>

var COLORS=['#185FA5','#1D9E75','#D85A30','#D4537E','#7F77DD','#BA7517','#E24B4A','#888780','#639922','#0F6E56'];
var DEFAULT_MEMBERS=['이승철','박인혜','우한재','한규민','이민선','이정화','민혜진','김유진'];
var STORAGE_KEY='duty_v12';

// ================================================================
//  ★ Google Apps Script 웹앱 URL을 아래에 붙여넣으세요
//    (STEP 3 배포 완료 후 복사한 URL)
//    예: 'https://script.google.com/macros/s/AKfyc.../exec'
// ================================================================
var API_URL = '여기에_구글_웹앱_URL_붙여넣기';

var S={members:[],duties:[],uses:[],specials:[],schedules:[],groups:[],groupStart:{},groupOrder:[],groupInitPtrs:[],customHolidays:{}};
var selectedNewColor=COLORS[0];
var mealChecked=false;
var USE_TYPES={'2h':{cost:1,hours:2},'4h':{cost:2,hours:4},'6h':{cost:3,hours:6},'1d':{cost:4,hours:8}};

// ================================================================
//  데이터 로드 — Google Sheets 우선, 실패 시 localStorage 폴백
// ================================================================
function load() {
  showLoadingToast('데이터 불러오는 중...');
  fetch(API_URL + '?action=getAll')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.members && data.members.length > 0) {
        S = data;
      } else {
        // Sheets가 비어있으면 기본 팀원으로 초기화 후 Sheets에 저장
        S.members = DEFAULT_MEMBERS.map(function(n, i) {
          return { id: i + 1, name: n, color: COLORS[i % COLORS.length], photo: '' };
        });
        save();
      }
      if(!S.schedules) S.schedules=[];
      applyTexts(); fillSelects(); updatePill(); refreshNewGroupSelect();
      if(document.getElementById('group-table-wrap')) renderGroupTable();
      preloadHolidays(); refreshNewGroupSelect();
    })
    .catch(function() {
      // 네트워크 오류 시 localStorage 폴백
      try {
        var fallbackKeys = ['duty_v12','duty_v11','duty_v10','duty_v9','duty_v8','duty_v7','duty_v6','duty_v5'];
        for (var i = 0; i < fallbackKeys.length; i++) {
          var s = localStorage.getItem(fallbackKeys[i]);
          if (s) { S = JSON.parse(s); break; }
        }
        if (!S.members || !S.members.length) {
          S.members = DEFAULT_MEMBERS.map(function(n, i) {
            return { id: i + 1, name: n, color: COLORS[i % COLORS.length], photo: '' };
          });
        }
      } catch(e) {}
      if(!S.schedules) S.schedules=[];
      applyTexts(); fillSelects(); updatePill(); refreshNewGroupSelect();
      if(document.getElementById('group-table-wrap')) renderGroupTable();
      preloadHolidays(); refreshNewGroupSelect();
    });
}

// ================================================================
//  데이터 저장 — Google Sheets + localStorage 동시 저장
// ================================================================
function save() {
  // localStorage 백업
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(S)); } catch(e) {}
  // Google Sheets 저장
  fetch(API_URL, {
    method: 'POST',
    body: JSON.stringify({ action: 'saveAll', data: S })
  }).catch(function() { /* 실패해도 localStorage 백업본 유지 */ });
}

function showLoadingToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.style.opacity = '1';
}

function getNames(){return S.members.map(function(m){return m.name;});}
function getMember(name){return S.members.filter(function(m){return m.name===name;})[0];}

  if(dutyType==='swap-out')return'';
  return meal
    ?'<span class="badge-meal">'+T.badgeMealYes+'</span>'

}

function toggleMeal(){mealChecked=!mealChecked;refreshMealUI();}
function refreshMealUI(){
  var cb=document.getElementById('meal-checkbox');
  var lbl=document.getElementById('meal-check-label');
  var wrap=document.getElementById('meal-check-wrap');
  if(mealChecked){cb.classList.add('checked');lbl.textContent=T.lblMealChecked;wrap.style.background='#dff0c8';wrap.style.borderColor='#639922';}
  else{cb.classList.remove('checked');lbl.textContent=T.lblMealUnchecked;wrap.style.removeProperty('background');wrap.style.removeProperty('border-color');}
}
function resetMeal(){mealChecked=false;refreshMealUI();}

function hasDutyOnDate(memberName,date){return S.duties.some(function(d){return d.member===memberName&&d.date===date;});}
function checkDuplicate(){
  var member=document.getElementById('inp-member').value;var date=document.getElementById('inp-date').value;
  var warn=document.getElementById('dup-warn');var mEl=document.getElementById('inp-member');var dEl=document.getElementById('inp-date');
  warn.style.display='none';mEl.classList.remove('err');dEl.classList.remove('err');
  if(!member||!date)return;
  if(hasDutyOnDate(member,date)){warn.style.display='block';warn.textContent=member+' '+T.dupWarnOrig;mEl.classList.add('err');dEl.classList.add('err');}
}
function checkSwapTargetDuplicate(){
  var sub=document.getElementById('inp-swap-target').value;var date=document.getElementById('inp-date').value;
  var warn=document.getElementById('dup-warn');var sEl=document.getElementById('inp-swap-target');
  sEl.classList.remove('err');if(!sub||!date)return;
  if(hasDutyOnDate(sub,date)){warn.style.display='block';warn.textContent=sub+' '+T.dupWarnSub;sEl.classList.add('err');}
}

function makeAvatar(member,size,fontSize){

  var wrap = document.getElementById('dept-dash-content');

    var totalH=0, usedH=0, balH=0, spH=0;

      var st = calcStats(m.name);

      balH   += st.balHours;

    });

function addDuty(){
  var member=document.getElementById('inp-member').value;var date=document.getElementById('inp-date').value;
  var type=document.getElementById('inp-type').value;var sub=document.getElementById('inp-swap-target').value;
  var note=document.getElementById('inp-note').value.trim();
  if(!member||!date){toast(T.msgNeedOrigDate);return;}
  // ── 럭키(휴무일) 처리 ──────────────────────────────────────
  if(type==='lucky'){
    var luckyName=(document.getElementById('inp-lucky-name').value.trim())||'휴무일';
    if(!S.customHolidays)S.customHolidays={};
    S.customHolidays[date]=luckyName;
    // schedules에도 담당자 기록 (캘린더 표시용)
    S.schedules=(S.schedules||[]).filter(function(s){return s.date!==date;});
    S.schedules.push({date:date,assignee:member,holiday:luckyName});
    save();
    // 폼 초기화
    document.getElementById('inp-date').value='';
    document.getElementById('inp-type').value='duty';
    document.getElementById('inp-lucky-name').value='';
    document.getElementById('lucky-wrap').style.display='none';
    document.getElementById('meal-check-wrap').style.display='flex';
    // 캘린더 갱신
    if(typeof renderCalendar==='function') renderCalendar();
    toast(date+' '+luckyName+' 럭키 처리됨');
    return;
  }
  if(type==='swap'&&!sub){toast(T.msgNeedSub);return;}
  if(type==='swap'&&sub===member){toast(T.msgSelfSwap);return;}
  if(hasDutyOnDate(member,date)){
    var w=document.getElementById('dup-warn');w.style.display='block';w.textContent=member+' '+T.dupWarnOrig;
    document.getElementById('inp-member').classList.add('err');document.getElementById('inp-date').classList.add('err');return;
  }
  if(type==='swap'&&hasDutyOnDate(sub,date)){
    var w=document.getElementById('dup-warn');w.style.display='block';w.textContent=sub+' '+T.dupWarnSub;
    document.getElementById('inp-swap-target').classList.add('err');return;
  }
  if(type==='swap'){alert(T.alertMealSwap.replace('{name}',sub));}
  var pid=Date.now();
  if(type==='duty'){
    S.duties.push({id:pid,member:member,date:date,type:'duty',swapPartner:'',rewardTo:member,note:note,meal:mealChecked});
  }else{
    S.duties.push({id:pid,member:member,date:date,type:'swap-out',swapPartner:sub,rewardTo:null,note:note,meal:false});
    S.duties.push({id:pid+1,member:sub,date:date,type:'swap-in',swapPartner:member,rewardTo:sub,note:note,meal:mealChecked});
  }
  save();
  document.getElementById('inp-date').value='';document.getElementById('inp-type').value='duty';document.getElementById('inp-note').value='';
  document.getElementById('swap-wrap').style.display='none';document.getElementById('swap-preview').style.display='none';
  document.getElementById('lucky-wrap').style.display='none';document.getElementById('meal-check-wrap').style.display='flex';
  resetDupWarn();resetMeal();
  toast(type==='duty'?member+' '+T.msgDutyAdded:sub+' '+T.msgSwapAdded);
}

function addUse(){
  var member=document.getElementById('use-member').value;var date=document.getElementById('use-date').value;var type=document.getElementById('use-type').value;
  if(!member||!date){toast(T.msgNeedMemberDate);return;}

}

function handleScheduleUpload(input) {
  if (!input.files || !input.files[0]) return;
  var file = input.files[0];
  document.getElementById('upload-filename').textContent = file.name;
  document.getElementById('upload-error').style.display = 'none';
  document.getElementById('upload-preview').style.display = 'none';

  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = new Uint8Array(e.target.result);
      var workbook = XLSX.read(data, { type: 'array', cellDates: true });
      var sheet = workbook.Sheets[workbook.SheetNames[0]];
      var rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });
      parseScheduleRows(rows);
    } catch(err) {
      showUploadError('파일을 읽을 수 없습니다: ' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

function parseScheduleRows(rows) {
  // 헤더 행 찾기: 날짜, 월, 화, 수, 목, 금 컬럼 위치 파악
  var headerRow = -1;
  var colDate = -1, colMon = -1, colTue = -1, colWed = -1, colThu = -1, colFri = -1;

  for (var r = 0; r < Math.min(rows.length, 5); r++) {
    var row = rows[r].map(function(v){ return String(v).trim(); });
    for (var c2 = 0; c2 < row.length; c2++) {
      var v = row[c2];
      if (/날짜|date/i.test(v)) { colDate = c2; headerRow = r; }
      if (v === '월') colMon = c2;
      if (v === '화') colTue = c2;
      if (v === '수') colWed = c2;
      if (v === '목') colThu = c2;
      if (v === '금') colFri = c2;
    }
    if (headerRow === r && colMon >= 0) break;
  }

  if (headerRow < 0 || colDate < 0 || colMon < 0) {
    showUploadError('헤더를 찾을 수 없습니다. 날짜, 월, 화, 수, 목, 금 컬럼이 있는지 확인해주세요.');
    return;
  }

  var dayColMap = [];
  if (colMon >= 0) dayColMap.push({ col: colMon, dow: 1 }); // 월=1
  if (colTue >= 0) dayColMap.push({ col: colTue, dow: 2 });
  if (colWed >= 0) dayColMap.push({ col: colWed, dow: 3 });
  if (colThu >= 0) dayColMap.push({ col: colThu, dow: 4 });
  if (colFri >= 0) dayColMap.push({ col: colFri, dow: 5 });

  var parsed = [];
  var dayNames = ['','월','화','수','목','금','토','일'];

  for (var r2 = headerRow + 1; r2 < rows.length; r2++) {
    var row2 = rows[r2];
    if (!row2 || row2.every(function(v){ return !v; })) continue;

    // 날짜 범위 파싱 (예: "03/30~04/03" 또는 "2026-04-07~2026-04-11")
    var dateRaw = String(row2[colDate] || '').trim();
    if (!dateRaw) continue;

    // 날짜 범위에서 시작일 추출
    var weekStart = parseDateRange(dateRaw);
    if (!weekStart) continue;

    // 월~금 각 컬럼에서 당직자 추출
    dayColMap.forEach(function(dc) {
      var cellVal = String(row2[dc.col] || '').trim();
      if (!cellVal) return;

      // 날짜 계산: 주 시작일 + 요일 오프셋
      var d = new Date(weekStart);
      // weekStart가 월요일 기준, dow=1(월)~5(금)
      var startDow = d.getDay(); // 0=일
      if (startDow === 0) startDow = 7; // 일요일이면 7로
      // 월요일 기준으로 맞추기
      var mondayDate = new Date(d);
      mondayDate.setDate(d.getDate() - (startDow - 1));

      var targetDate = new Date(mondayDate);
      targetDate.setDate(mondayDate.getDate() + (dc.dow - 1));
      var ds = fmtDate(targetDate);

      // 당직자 이름 추출 (변경 표기 제거, 순번 숫자 제거)
      var name = extractName(cellVal);
      if (name) {
        parsed.push({ date: ds, assignee: name, raw: cellVal });
      }
    });
  }

  if (!parsed.length) {
    showUploadError('파싱된 데이터가 없습니다. 파일 구조를 확인해주세요.');
    return;
  }

  // 중복 제거 (같은 날짜 마지막 값 우선)
  var deduped = {};
  parsed.forEach(function(p){ deduped[p.date] = p; });
  uploadedScheduleParsed = Object.values(deduped).sort(function(a,b){ return a.date.localeCompare(b.date); });

  showUploadPreview(uploadedScheduleParsed);
}

function parseDateRange(raw) {
  // "03/30~04/03", "2026-04-07~2026-04-11", "04/06~04/10" 등
  var part = raw.split(/[~–-]/)[0].trim();
  // MM/DD 형식
  var m1 = part.match(/^(\d{1,2})\/(\d{1,2})$/);
  if (m1) {
    var now = new Date();
    return new Date(now.getFullYear(), parseInt(m1[1])-1, parseInt(m1[2]));
  }
  // YYYY-MM-DD 형식
  var m2 = part.match(/^(\d{4})[-\/](\d{1,2})[-\/](\d{1,2})$/);
  if (m2) {
    return new Date(parseInt(m2[1]), parseInt(m2[2])-1, parseInt(m2[3]));
  }
  // 엑셀 날짜 숫자 (이미 Date 객체로 변환된 경우)
  if (!isNaN(Date.parse(raw))) return new Date(raw);
  return null;
}

function extractName(cellVal) {
  var s = String(cellVal).trim();
  // 변경 표기 → 앞의 원래 이름만 (→, >, ->, →)
  s = s.split(/→|->|>|→/)[0].trim();
  // 공휴일 표기 제거: (xxx) 패턴
  s = s.replace(/^\([^)]+\)\s*/, '').trim();
  // 순번 숫자 제거: "01.홍길동", "14.한규민" → "홍길동", "한규민"
  s = s.replace(/^\d+\.\s*/, '').trim();
  // 빈 값이거나 숫자만인 경우 제외
  if (!s || /^\d+$/.test(s)) return '';
  return s;
}

function fmtDate(d) {
  return d.getFullYear() + '-' + pad2(d.getMonth()+1) + '-' + pad2(d.getDate());
}

// ── 대한민국 공휴일 (Nager.Date API 기반, 연도별 캐시) ────────
// 고정 공휴일 (API 실패 시 폴백)
var KR_HOLIDAYS_FIXED = {
  '01-01':'신정','03-01':'삼일절','05-05':'어린이날','06-06':'현충일',
  '08-15':'광복절','10-03':'개천절','10-09':'한글날','12-25':'성탄절'
};
// 임시공휴일 (선거일 등 Nager API 미포함 항목) — 전체 날짜키 YYYY-MM-DD
var KR_EXTRA_HOLIDAYS = {
  '2026-06-03':'지방선거',
  '2026-03-02':'삼일절 대체공휴일',
  '2026-05-25':'부처님오신날 대체공휴일'
};
// 연도별 캐시: { '2026': { 'YYYY-MM-DD': '공휴일명', ... }, ... }
var KR_HOLIDAYS_CACHE = {};

function fetchHolidays(year, callback) {
  var y = String(year);
  if (KR_HOLIDAYS_CACHE[y]) { if(callback) callback(); return; }
  fetch('https://date.nager.at/api/v3/PublicHolidays/' + y + '/KR')
    .then(function(r){ return r.json(); })
    .then(function(data){
      var map = {};
      data.forEach(function(h){ map[h.date] = h.localName || h.name; });
      // 임시공휴일 병합
      Object.keys(KR_EXTRA_HOLIDAYS).forEach(function(ds){
        if (ds.slice(0,4) === y) map[ds] = KR_EXTRA_HOLIDAYS[ds];
      });
      KR_HOLIDAYS_CACHE[y] = map;
      if(callback) callback();
    })
    .catch(function(){
      // API 실패 시 고정 공휴일로 폴백
      var map = {};
      Object.keys(KR_HOLIDAYS_FIXED).forEach(function(mmdd){
        map[y + '-' + mmdd] = KR_HOLIDAYS_FIXED[mmdd];
      });
      // 임시공휴일 병합
      Object.keys(KR_EXTRA_HOLIDAYS).forEach(function(ds){
        if (ds.slice(0,4) === y) map[ds] = KR_EXTRA_HOLIDAYS[ds];
      });
      KR_HOLIDAYS_CACHE[y] = map;
      if(callback) callback();
    });
}

// 앱 시작 시 이번 해 + 내년 공휴일 미리 로드
function preloadHolidays() {
  var now = new Date();
  var yr = now.getFullYear();
  fetchHolidays(yr, function(){
    fetchHolidays(yr+1, function(){
      renderCalendar();
    });
  });
}

var calYear  = new Date().getFullYear();
var calMonth = new Date().getMonth(); // 0-based
var selectedCalDate = '';

function isHoliday(dateStr) {
  // 커스텀 휴무일 우선 확인
  if (S.customHolidays && S.customHolidays[dateStr]) return S.customHolidays[dateStr];
  var y = dateStr.slice(0,4);
  var cache = KR_HOLIDAYS_CACHE[y];
  if (cache) return cache[dateStr] || null;
  // 캐시 없으면 고정 폴백
  var mmdd = dateStr.slice(5);
  return KR_HOLIDAYS_FIXED[mmdd] || null;
}
function isWeekend(dateStr) {
  var d = new Date(dateStr + 'T00:00:00');
  return d.getDay() === 0 || d.getDay() === 6;
}
function isWorkday(dateStr) {
  return !isWeekend(dateStr) && !isHoliday(dateStr);
}
function pad2(n) { return n < 10 ? '0' + n : '' + n; }
function dateStr(y, m, d) { return y + '-' + pad2(m+1) + '-' + pad2(d); }

function getSchedule(dateStr) {
  return (S.schedules||[]).filter(function(s){ return s.date === dateStr; })[0] || null;
}

function moveCalMonth(dir) {
  calMonth += dir;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  if (calMonth < 0)  { calMonth = 11; calYear--; }
  // 해당 연도 공휴일 캐시 없으면 로드 후 렌더
  if (!KR_HOLIDAYS_CACHE[String(calYear)]) {
    fetchHolidays(calYear, function(){ renderCalendar(); });
  } else {
    renderCalendar();
  }
}

function renderCalendar() {
  // 월 라벨
  var lbl = document.getElementById('cal-month-label');
  if (lbl) lbl.textContent = calYear + '년 ' + (calMonth+1) + '월';

  // 요일 헤더
  var dowRow = document.getElementById('cal-dow-row');
  if (!dowRow) return;
  var dows = ['일','월','화','수','목','금','토'];
  var dowClasses = ['sun','','','','','','sat'];
  dowRow.innerHTML = dows.map(function(d,i){
    return '<div class="cal-dow '+dowClasses[i]+'">'+d+'</div>';
  }).join('');

  // 달력 셀
  var body = document.getElementById('cal-body');
  if (!body) return;
  body.innerHTML = '';

  var firstDay = new Date(calYear, calMonth, 1).getDay(); // 0=일
  var daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  var today = new Date().toISOString().slice(0,10);
  var selMember = document.getElementById('inp-member') ? document.getElementById('inp-member').value : '';

  // 빈 셀
  for (var i = 0; i < firstDay; i++) {
    var empty = document.createElement('div');
    empty.className = 'cal-cell cal-empty';
    body.appendChild(empty);
  }

  for (var day = 1; day <= daysInMonth; day++) {
    var ds = dateStr(calYear, calMonth, day);
    var weekend = isWeekend(ds);
    var holiday = isHoliday(ds);
    var sched   = getSchedule(ds);
    var isToday = ds === today;
    var isSel   = ds === selectedCalDate;
    var isMyDuty = sched && selMember && sched.assignee === selMember;

    var cls = 'cal-cell';
    if (weekend)  cls += ' cal-weekend';
    if (holiday)  cls += ' cal-holiday';
    if (sched && !weekend) cls += ' cal-has-duty';
    if (isMyDuty) cls += ' cal-my-duty';
    if (isToday)  cls += ' cal-today';
    if (isSel)    cls += ' cal-selected';

    var inner = '<div class="cal-date">' + day + '</div>';
    if (holiday) inner += '<div class="cal-holiday-label">' + holiday + '</div>';
    if (sched && sched.assignee) {
      var luckyBadge = (sched.holiday||holiday) ? ' <span style="font-size:8px;color:#A32D2D;font-weight:700">럭키</span>' : '';
      inner += '<div class="cal-assignee">' + escHtml(sched.assignee) + luckyBadge + '</div>';
    }
    // 특별근무 배지
    var daySpecials = (S.specials||[]).filter(function(sp){ return sp.date === ds; });
    daySpecials.forEach(function(sp) {
      var spCls = sp.type==='night'?'cal-sp-night':sp.type==='weekend'?'cal-sp-weekend':'cal-sp-other';
      var spLbl = sp.type==='night'?'야간':sp.type==='weekend'?'휴일':'기타';
      inner += '<div class="cal-special '+spCls+'">'+escHtml(sp.member)+' '+spLbl+'</div>';
    });

    var cell = document.createElement('div');
    cell.className = cls;
    cell.innerHTML = inner;

    if (!weekend) {
      cell.onclick = (function(d, sc) { return function() {
        onCalCellClick(d, sc);
      }; })(ds, sched);
    }
    body.appendChild(cell);
  }
}

function onCalCellClick(ds, sched) {
  selectedCalDate = ds;
  // 날짜 입력 필드에 자동 세팅
  var dateInput = document.getElementById('inp-date');
  if (dateInput) {
    dateInput.value = ds;
    checkDuplicate();
    updatePreview();
  }
  // 근무표에 담당자가 있으면 팀원 select도 자동 세팅
  if (sched && sched.assignee) {
    var memberSel = document.getElementById('inp-member');
    if (memberSel) {
      memberSel.value = sched.assignee;
      checkDuplicate();
      updatePreview();
    }
  }
  // 기존 팝업 닫기
  var existing = document.getElementById('sched-popup');
  if (existing) existing.remove();
  renderCalendar();
}

// ── 근무표에서 팀원 선택시 해당 날짜 자동 연결 ───────────────
function autoSetDateFromSchedule(memberName) {
  if (!memberName) return;
  var today = new Date();
  var y = today.getFullYear(), m = today.getMonth();
  // 이번달 근무표에서 해당 팀원 날짜 찾기
  var sched = (S.schedules||[]).filter(function(s){
    return s.assignee === memberName && s.date.slice(0,7) === (y+'-'+pad2(m));
  })[0];
  if (sched) {
    var dateInput = document.getElementById('inp-date');
    if (dateInput && !dateInput.value) {
      dateInput.value = sched.date;
      selectedCalDate = sched.date;
      checkDuplicate();
    }
    renderCalendar();
  }
}

function calcSpecialHours(name){
  if(!S.specials)return 0;
  return S.specials.filter(function(s){return s.member===name;}).reduce(function(a,s){return a+s.hours;},0);
}

function calcStats(name){
  var rd=S.duties.filter(function(d){return d.rewardTo===name;}).length;
  var total=rd;
  var usedCost=S.uses.filter(function(u){return u.member===name;}).reduce(function(a,u){return a+(USE_TYPES[u.type]?USE_TYPES[u.type].cost:1);},0);
  var spH=calcSpecialHours(name);
  // 당직 잔여시간 + 특별근무 시간 합산
  var dutyBalH=(total-usedCost)*2;
  var totalBalH=dutyBalH+spH;
  return{
    rd:rd,
    total:total,
    used:usedCost,
    balance:total-usedCost,
    balHours:totalBalH,
    balDays:Math.floor(totalBalH/8),
    balRemH:totalBalH%8,
    specialHours:spH,
    dutyHours:rd*2
  };
}

    var noteHtml=d.note?'<div class="note-text">'+escHtml(d.note)+'</div>':'';
    return'<tr><td>'+d.date+'</td><td><span class="badge '+bc+'">'+bl+'</span></td><td style="color:var(--muted)">'+det+'</td>'+
      '<td><div style="display:flex;align-items:center;gap:4px"><span style="color:'+rc+';font-weight:600">'+rv+'</span>'+mb+'</div>'+noteHtml+'</td>'+
      '<td style="text-align:right"><button class="btn btn-sm btn-del" onclick="delDuty('+d.id+',\''+escHtml(name)+'\')">'+T.btnDelete+'</button></td></tr>';
  }).join(''):'<tr><td colspan="5" class="empty">'+T.emptyDuty+'</td></tr>';
  var specials=(S.specials||[]).filter(function(s){return s.member===name;}).sort(function(a,b){return b.date.localeCompare(a.date);});
  var specialRows=specials.length?specials.map(function(s){
    return'<tr><td>'+s.date+'</td>'+
      '<td><span class="badge '+spBadgeClass(s.type)+'">'+spBadgeLabel(s.type)+'</span></td>'+
      '<td style="color:var(--success);font-weight:600">+'+s.hours+'h</td>'+
      '<td style="color:var(--muted);font-size:12px">'+escHtml(s.note)+'</td>'+
      '<td style="text-align:right"><button class="btn btn-sm btn-del" onclick="delSpecial('+s.id+',\''+escHtml(name)+'\')">'+T.btnDelete+'</button></td></tr>';
  }).join(''):'<tr><td colspan="5" class="empty">'+T.emptySpecial+'</td></tr>';
  var useRows=uses.length?uses.map(function(u){
    var ut=USE_TYPES[u.type]||{cost:1,hours:2};
    return'<tr><td>'+u.date+'</td><td><span class="badge b-use">'+ut.hours+T.hours+' 휴무</span></td>'+
      '<td style="color:var(--danger);font-weight:600">−'+ut.cost+T.time+' (−'+ut.hours+'h)</td>'+
      '<td style="text-align:right"><button class="btn btn-sm btn-del" onclick="delUse('+u.id+',\''+escHtml(name)+'\')">'+T.btnDelete+'</button></td></tr>';
  }).join(''):'<tr><td colspan="4" class="empty">'+T.emptyUse+'</td></tr>';
  var balText=(st.balDays>0?st.balDays+T.day+' ':'')+( st.balRemH>0?st.balRemH+'h':st.balDays>0?'':'0h');
  document.getElementById('member-detail').innerHTML=
    '<div class="section-wrap"><div class="section-head"><div class="section-head-dot"></div><div class="section-head-title">'+escHtml(name)+' '+T.detailTitle+'</div></div>'+
    '<div class="section-body">'+
      '<div style="display:flex;align-items:center;gap:14px;margin-bottom:1.25rem;padding-bottom:1.25rem;border-bottom:1.5px solid var(--key-border)">'+
        makeAvatar(name,52,18)+
        '<div><div style="font-size:17px;font-weight:700">'+escHtml(name)+'</div>'+
        '<div style="font-size:12px;color:var(--muted);margin-top:3px">당직 '+st.rd+T.realRd+' · 특별근무 '+st.specialHours+'h 포함</div></div>'+
        '<div style="margin-left:auto;text-align:right"><div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px">'+T.rateLabel+'</div>'+
        '<div style="font-size:24px;font-weight:700;color:var(--key-mid)">'+pct+'%</div></div>'+
      '</div>'+
      '<div class="stat-row">'+
        '<div class="stat"><div class="stat-lbl">'+T.statRd+'</div><div class="stat-val">'+st.rd+'<span class="stat-unit">'+T.time+'</span></div><div class="stat-sub">'+(st.rd*2)+'h</div></div>'+
        '<div class="stat"><div class="stat-lbl">'+T.statTotal+'</div><div class="stat-val">'+st.balHours+'<span class="stat-unit">h</span></div><div class="stat-sub">'+T.hours+' (당직+'+(st.specialHours>0?st.specialHours+'h 특별':'없음')+')</div></div>'+
        '<div class="stat"><div class="stat-lbl">'+T.statUsed+'</div><div class="stat-val">'+st.used+'<span class="stat-unit">'+T.time+'</span></div><div class="stat-sub">&nbsp;</div></div>'+
        '<div class="stat"><div class="stat-lbl">'+T.statBal+'</div><div class="stat-val" style="color:var(--key-mid)">'+st.balHours+'<span class="stat-unit">h</span></div><div class="stat-sub">'+(st.balDays>0?st.balDays+'일 ':'')+( st.balRemH>0?st.balRemH+'h':st.balDays>0?'':'0h')+'</div></div>'+
      '</div>'+
      '<div style="margin-bottom:1.5rem"><div style="display:flex;justify-content:space-between;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em"><span>'+T.statRate+'</span><span>'+st.used+' / '+st.total+T.time+'</span></div>'+
      '<div class="bar-track"><div class="bar-fill" style="width:'+pct+'%"></div></div></div>'+
      '<div style="margin-bottom:1.5rem"><div class="sub-divider">'+T.subDutyHist+'</div>'+
      '<div class="table-wrap"><table><thead><tr><th>'+T.thDate+'</th><th>'+T.thType+'</th><th>'+T.thDetail+'</th><th>'+T.thReward+' / '+T.thNote+'</th><th></th></tr></thead><tbody>'+dutyRows+'</tbody></table></div></div>'+
      '<div style="margin-bottom:1.5rem"><div class="sub-divider">'+T.subSpecialHist+'</div>'+
      '<div class="table-wrap"><table><thead><tr><th>'+T.thDate+'</th><th>'+T.thType+'</th><th>'+T.thHours+'</th><th>'+T.thNote+'</th><th></th></tr></thead><tbody>'+specialRows+'</tbody></table></div></div>'+
      '<div><div class="sub-divider">'+T.subUseHist+'</div>'+
      '<div class="table-wrap"><table><thead><tr><th>'+T.thDate+'</th><th>'+T.thType+'</th><th>'+T.thDeduct+'</th><th></th></tr></thead><tbody>'+useRows+'</tbody></table></div></div>'+
    '</div></div>';
}

function delDuty(id,name){
  var e=S.duties.filter(function(d){return d.id===id;})[0];if(!e)return;
  if(e.type==='swap-out'||e.type==='swap-in'){
    var pt=e.type==='swap-out'?'swap-in':'swap-out';
    var pair=S.duties.filter(function(d){return d.member===e.swapPartner&&d.date===e.date&&d.type===pt;})[0];
    if(!confirm(T.confirmDelSwap+' '+e.swapPartner+' '+T.confirmDelSwap2))return;
    if(pair)S.duties=S.duties.filter(function(d){return d.id!==pair.id;});
  }else{if(!confirm(T.confirmDelDuty))return;}
  S.duties=S.duties.filter(function(d){return d.id!==id;});save();renderDetail(name);
}
function delUse(id,name){
  if(!confirm(T.confirmDelUse))return;
  S.uses=S.uses.filter(function(u){return u.id!==id;});save();renderDetail(name);
}

function renderHistory(){
  var fm=document.getElementById('flt-member').value;var ft=document.getElementById('flt-type').value;
  var rows=[];
  S.duties.forEach(function(d){
    if(fm&&d.member!==fm)return;if(ft==='use')return;if(ft&&ft!==d.type)return;
    var bc,bl,det,rv,pos;
    if(d.type==='duty'){bc='b-duty';bl=T.badgeDuty;det='—';rv='+2h';pos=true;}
    else if(d.type==='swap-out'){bc='b-out';bl=T.badgeOut;det='→ '+d.swapPartner;rv='—';pos=false;}
    else{bc='b-in';bl=T.badgeIn;det='← '+d.swapPartner;rv='+2h';pos=true;}
    rows.push({date:d.date,member:d.member,bc:bc,bl:bl,det:det,rv:rv,pos:pos,note:d.note||'',dutyType:d.type,meal:d.meal});
  });
  (S.specials||[]).forEach(function(s){
    if(fm&&s.member!==fm)return;
    if(ft&&ft!=='special')return;
    rows.push({date:s.date,member:s.member,bc:spBadgeClass(s.type),bl:spBadgeLabel(s.type),det:escHtml(s.note)||'—',rv:'+'+s.hours+'h',pos:true,note:'',dutyType:'special',meal:false});
  });
  S.uses.forEach(function(u){
    if(fm&&u.member!==fm)return;if(ft&&ft!=='use')return;
    var ut=USE_TYPES[u.type]||{cost:1,hours:2};
    rows.push({date:u.date,member:u.member,bc:'b-use',bl:ut.hours+T.hours+' 휴무',det:'—',rv:'−'+ut.hours+'h',pos:false,note:'',dutyType:'use',meal:false});
  });
  rows.sort(function(a,b){return b.date.localeCompare(a.date);});
  var w=document.getElementById('history-table');
  if(!rows.length){w.innerHTML='<div class="empty">'+T.emptyHist+'</div>';return;}
  w.innerHTML='<table><thead><tr><th>'+T.thDate+'</th><th>'+T.thMember+'</th><th>'+T.thType+'</th><th>'+T.thDetail+'</th><th style="text-align:right">'+T.thReward+'</th><th>'+T.thNote+'</th></tr></thead><tbody>'+
    rows.map(function(r){
      var mb=r.dutyType!=='use'?mealBadgeHtml(r.dutyType,r.meal):'';
      return'<tr><td>'+r.date+'</td><td style="font-weight:600">'+escHtml(r.member)+'</td><td><span class="badge '+r.bc+'">'+r.bl+'</span></td>'+
        '<td style="color:var(--muted)">'+escHtml(r.det)+'</td>'+
        '<td style="text-align:right"><div style="display:flex;align-items:center;justify-content:flex-end;gap:4px"><span style="font-weight:600;color:'+(r.pos?'var(--success)':'var(--muted)')+'">'+r.rv+'</span>'+mb+'</div></td>'+
        '<td style="color:var(--muted);font-size:12px">'+escHtml(r.note)+'</td></tr>';
    }).join('')+'</tbody></table>';
}

function renderManage(){
  var w=document.getElementById('manage-list');
  if(!S.members.length){w.innerHTML='<div class="empty">'+T.emptyMembers+'</div>';return;}
  w.innerHTML=S.members.map(function(m){
    var st=calcStats(m.name);
    return'<div class="member-row-item"><div style="display:flex;align-items:center;gap:12px">'+makeAvatar(m,42,16)+
      '<div>'+
        '<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">'+
          '<div style="font-size:14px;font-weight:700">'+escHtml(m.name)+'</div>'+
          (m.depts&&m.depts.length?m.depts.map(function(d){return '<span style="font-size:10px;font-weight:600;padding:1px 7px;border-radius:10px;background:'+(DEPT_COLORS[d]||'#888')+'22;color:'+(DEPT_COLORS[d]||'#888')+';border:1px solid '+(DEPT_COLORS[d]||'#888')+'44">'+d+'</span>';}).join(''):'')+'</div>'+
        '<div style="font-size:11px;color:var(--muted);margin-top:2px">'+T.rdUnit+' '+st.rd+T.time+' · '+T.balUnit+' '+st.balHours+'h'+(m.dept?' · <span style="font-weight:600;color:'+(DEPT_COLORS[m.dept]||'var(--muted)')+'">'+m.dept+'</span>':'')+(m.group!==undefined&&m.group!==''?' · <span style="font-weight:600;color:var(--key)">'+(parseInt(m.group)+1)+'그룹</span>':'')+'</div>'+
      '</div></div>'+
      '<div style="display:flex;gap:6px"><button class="btn btn-sm btn-ghost" onclick="openEditModal('+m.id+')">'+T.btnEdit+'</button>'+
      '<button class="btn btn-sm btn-del" onclick="removeMember('+m.id+',\''+escHtml(m.name)+'\')">'+T.btnRetire+'</button></div></div>';
  }).join('');updatePill();
}

var editModalMemberId=null,editModalColor=COLORS[0],editModalPhoto='',editModalDept='',editModalGroup='';
function openEditModal(id){
  var m=S.members.filter(function(x){return x.id===id;})[0];if(!m)return;
  editModalMemberId=id;editModalColor=m.color||COLORS[0];editModalPhoto=m.photo||'';editModalDept=m.dept||'';editModalGroup=m.group!==undefined?m.group:'';
  var wrap=document.getElementById('edit-modal-wrap');wrap.style.display='block';
  var ms=document.querySelector('#page-members .section-wrap:last-of-type');if(ms)ms.after(wrap);
  wrap.innerHTML=
    '<div class="section-wrap" style="border:2px solid var(--key-mid);margin-top:1rem">'+
      '<div class="section-head" style="background:var(--key-mid)"><div class="section-head-dot" style="background:#fff"></div>'+
      '<div class="section-head-title" style="color:#fff">'+escHtml(m.name)+' — '+T.editProfileTitle+'</div></div>'+
      '<div class="section-body"><div style="display:flex;gap:24px;flex-wrap:wrap">'+
        '<div style="flex:1;min-width:180px"><label style="margin-bottom:8px;display:block">'+T.labelPhoto+'</label>'+
        '<div class="upload-area">'+
          '<div class="upload-preview" id="edit-preview" style="width:64px;height:64px;font-size:22px;'+(editModalPhoto?'':'background:'+editModalColor+';color:#fff;border-color:rgba(0,0,0,0.1)')+'">'+(editModalPhoto?'<img src="'+editModalPhoto+'" alt="">':escHtml(m.name.slice(0,1)))+'</div>'+
          '<div class="upload-btns"><input type="file" id="edit-file-input" accept="image/*" onchange="handlePhotoUpload(this)">'+
          '<button class="btn btn-sm btn-ghost" onclick="document.getElementById(\'edit-file-input\').click()">'+T.btnUploadImg+'</button>'+
          '<button class="btn btn-sm btn-del" id="edit-remove-photo-btn" style="'+(editModalPhoto?'':'display:none')+'" onclick="removePhoto()">'+T.btnRemoveImg+'</button></div></div></div>'+
        '<div style="flex:1;min-width:180px"><label style="margin-bottom:8px;display:block">'+T.labelColor+' <span style="font-size:11px;color:var(--muted);text-transform:none;letter-spacing:0">(사진 없을 때 표시)</span></label>'+
        '<div class="color-swatches" id="edit-color-swatches"></div>'+
        '<label style="margin-bottom:6px;display:block;margin-top:14px">'+T.lblDept+'</label>'+
        '<select id="edit-dept-select" style="width:100%;padding:8px 12px;font-size:13px;font-weight:500;border:1.5px solid var(--border-mid);border-radius:var(--r-md);background:var(--bg);color:var(--text);font-family:var(--font)">'+
        '<option value="">부서 선택 안 함</option>'+
        DEPTS.map(function(d){return '<option value="'+d+'"'+(editModalDept===d?' selected':'')+'>'+d+'</option>';}).join('')+
        '</select>'+
        '<label style="margin-bottom:6px;display:block;margin-top:10px;font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.03em;text-transform:uppercase">'+T.lblNewGroup+'</label>'+
        '<select id="edit-group-select" style="width:100%;padding:8px 12px;font-size:13px;font-weight:500;border:1.5px solid var(--border-mid);border-radius:var(--r-md);background:var(--bg);color:var(--text);font-family:var(--font)">'+
        '<option value="">그룹 선택 안 함</option>'+
        (S.groups||[]).map(function(g,i){return '<option value="'+i+'"'+(editModalGroup===i||editModalGroup===String(i)?' selected':'')+'>'+( i+1)+'그룹</option>';}).join('')+
        '</select></div></div>'+

        '<div style="display:flex;justify-content:flex-end;gap:8px;margin-top:1.25rem;padding-top:1rem;border-top:1px solid var(--border)">'+
        '<button class="btn btn-sm" onclick="closeEditModal()">'+T.btnCancel+'</button>'+
        '<button class="btn btn-sm btn-primary" onclick="saveEditModal()">'+T.btnSave+'</button></div></div></div>';
  renderColorSwatches('edit-color-swatches',editModalColor,function(c){editModalColor=c;refreshEditPreview();});
  var edSel=document.getElementById('edit-dept-select');
  if(edSel){edSel.value=editModalDept;}
}
function refreshEditPreview(){
  var prev=document.getElementById('edit-preview');if(!prev)return;
  var m=S.members.filter(function(x){return x.id===editModalMemberId;})[0];if(!m)return;
  if(editModalPhoto){prev.innerHTML='<img src="'+editModalPhoto+'" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:50%">';prev.style.background='';prev.style.color='';}
  else{prev.innerHTML=escHtml(m.name.slice(0,1));prev.style.background=editModalColor;prev.style.color='#fff';}
}
function handlePhotoUpload(input){
  if(!input.files||!input.files[0])return;var file=input.files[0];
  if(file.size>2*1024*1024){toast('2MB 이하 이미지를 선택해주세요.');return;}
  var reader=new FileReader();
  reader.onload=function(e){editModalPhoto=e.target.result;var rb=document.getElementById('edit-remove-photo-btn');if(rb)rb.style.display='';refreshEditPreview();};
  reader.readAsDataURL(file);
}
function removePhoto(){editModalPhoto='';var rb=document.getElementById('edit-remove-photo-btn');if(rb)rb.style.display='none';refreshEditPreview();}
function saveEditModal(){
  var m=S.members.filter(function(x){return x.id===editModalMemberId;})[0];if(!m)return;
  var eds=document.getElementById('edit-dept-select');
  var egs=document.getElementById('edit-group-select');
  var newGroup=egs?egs.value:'';
  // 기존 그룹에서 이름 제거
  (S.groups||[]).forEach(function(row){
    for(var di=0;di<row.length;di++){
      if(row[di]===m.name) row[di]='';
    }
  });
  // 새 그룹에 배치 (빈 슬롯에 자동 배치)
  if(newGroup!==''){
    var gi=parseInt(newGroup);
    if(!S.groups[gi]) S.groups[gi]=['','','','',''];
    var placed=false;
    for(var di=0;di<5;di++){
      if(!S.groups[gi][di]){S.groups[gi][di]=m.name;placed=true;break;}
    }
  }
  m.color=editModalColor;m.photo=editModalPhoto;m.dept=eds?eds.value:'';m.group=newGroup;
  save();closeEditModal();renderManage();renderDash();toast(m.name+' '+T.msgMemberUpdated);
}
function closeEditModal(){var wrap=document.getElementById('edit-modal-wrap');wrap.style.display='none';wrap.innerHTML='';editModalMemberId=null;}

function addMember(){
  var n=document.getElementById('new-name').value.trim();
  if(!n){toast(T.msgNeedName);return;}
  if(S.members.filter(function(m){return m.name===n;}).length){toast(T.msgDupName);return;}
  var deptVal=document.getElementById('new-dept-select')?document.getElementById('new-dept-select').value:'';
  var groupVal=document.getElementById('new-group-select')?document.getElementById('new-group-select').value:'';
  S.members.push({id:Date.now(),name:n,color:selectedNewColor,photo:'',dept:deptVal,group:groupVal});
  // 그룹 지정이 있으면 S.groups 테이블에도 자동 반영 (요일 무관 — 빈 슬롯에 채움)
  if(groupVal!==''){
    var gi=parseInt(groupVal);
    if(!S.groups[gi]) S.groups[gi]=['','','','',''];
    // 비어있는 요일 슬롯 첫 번째에 자동 배치
    var placed=false;
    for(var di2=0;di2<5;di2++){
      if(!S.groups[gi][di2]){S.groups[gi][di2]=n;placed=true;break;}
    }
  }
  save();document.getElementById('new-name').value='';selectedNewColor=COLORS[0];
  var nds2=document.getElementById('new-dept-select');if(nds2)nds2.value='';
  var ngs=document.getElementById('new-group-select');if(ngs)ngs.value='';
  renderColorSwatches('new-color-swatches',selectedNewColor,function(c){selectedNewColor=c;});
  renderManage();fillSelects();refreshNewGroupSelect();toast(n+' '+T.msgMemberAdded);
}
function removeMember(id,name){
  var hasDuties=S.duties.some(function(d){return d.member===name;})||S.uses.some(function(u){return u.member===name;});
  if(!confirm(hasDuties?name+' '+T.confirmRetireData:name+' '+T.confirmRetire))return;
  S.members=S.members.filter(function(m){return m.id!==id;});
  S.duties=S.duties.filter(function(d){return d.member!==name&&d.swapPartner!==name;});
  S.uses=S.uses.filter(function(u){return u.member!==name;});
  save();closeEditModal();renderManage();fillSelects();toast(name+' '+T.msgMemberRemoved);
}

function updatePill(){var el=document.getElementById('team-pill');if(el)el.textContent=T.teamPill+' '+S.members.length+'명';}
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.style.opacity='1';clearTimeout(t._t);t._t=setTimeout(function(){t.style.opacity='0';},2400);}
function escHtml(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

load();
</script>
</body>
</html>
